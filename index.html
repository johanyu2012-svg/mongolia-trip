<style>

<script>

let groups=JSON.parse(localStorage.getItem('groups')||'{}');
let users=[];
try{
 users=JSON.parse(localStorage.getItem('users'))||[];
}catch(e){
 users=[];
}

if(!groups || Object.keys(groups).length===0){
 groups={
   "草原團":{
     list:["護照"],
     trip:["Day1 草原"],
     note:"注意事項"
   }

 };
 localStorage.setItem('groups',JSON.stringify(groups));
}

let currentGroup="",currentUser="",editingGroup="";

function save(){
 localStorage.setItem('groups',JSON.stringify(groups));
 localStorage.setItem('users',JSON.stringify(users));
}

function show(id){
 document.querySelectorAll('.section').forEach(s=>s.style.display='none');
 document.getElementById(id).style.display='block';

 if(id==="login"){
   loadGroups();
   loadUsers();
 }
 if(id==="admin"){
   loadGroups();
 }
}

function loadGroups(){
 let sel=document.getElementById("group");
 let list=document.getElementById("groupList");

 if(!sel) return;

 sel.innerHTML='<option value="">選團</option>';
 Object.keys(groups).forEach(g=>{
   let opt=document.createElement("option");
   opt.value=g;
   opt.textContent=g;
   sel.appendChild(opt);
 });

 if(!list) return;

 list.innerHTML="";
 Object.keys(groups).forEach(g=>{
   let div=document.createElement("div");

   let edit=document.createElement("button");
   edit.innerText="編輯";
   edit.onclick=()=>editGroup(g);

   let del=document.createElement("button");
   del.innerText="刪除";
   del.onclick=()=>{
     delete groups[g];
     save();
     loadGroups();
   };

   div.innerText=g+" ";
   div.appendChild(edit);
   div.appendChild(del);

   list.appendChild(div);
 });
}

function loadUsers(){
 let sel=document.getElementById("userHistory");
 if(!sel) return;   // ⭐ 關鍵防爆

 sel.innerHTML='<option value="">歷史紀錄</option>';

 users.forEach(u=>{
   let opt=document.createElement("option");
   opt.value=u;
   opt.textContent=u;
   sel.appendChild(opt);
 });

 sel.onchange=function(){
   document.getElementById("nameInput").value=this.value;
 };
}

function login(){
 let name=document.getElementById("nameInput").value;
 let g=document.getElementById("group").value;

 if(!name||!g){alert("請填寫");return;}

 currentUser=name;
 currentGroup=g;

 if(!users.includes(name)) users.push(name);

 save();

 document.getElementById("userInfo").innerText="👤 "+name+"（"+g+"）";

 render();
 show("home");
}

function render(){
 let g=groups[currentGroup];
 if(!g) return;

 document.getElementById("trip").innerHTML=(g.trip||[]).join("<br>");
 document.getElementById("list").innerHTML=(g.list||[]).join("<br>");
 document.getElementById("note").innerText=g.note||"";
}

function editGroup(g){
 editingGroup=g;
 document.getElementById("editList").value=groups[g].list.join(",");
 document.getElementById("editTrip").value=groups[g].trip.join(",");
 document.getElementById("editNote").value=groups[g].note;
 document.getElementById("editArea").style.display="block";
}

function saveEdit(){
 groups[editingGroup].list=document.getElementById("editList").value.split(",");
 groups[editingGroup].trip=document.getElementById("editTrip").value.split(",");
 groups[editingGroup].note=document.getElementById("editNote").value;

 save();
 loadGroups();
 document.getElementById("editArea").style.display="none";
}

function generate(){
 let g=groups[currentGroup];


 let notes=[];
if(season.value==="春") notes.push("請攜帶個人盥洗用品,太陽眼鏡,厚外套,手套,保暖衣與保濕用品");
if(season.value==="夏") notes.push("請攜帶個人盥洗用品,太陽眼鏡,薄外套與防曬乳");
if(season.value==="秋") notes.push("請攜帶個人盥洗用品,太陽眼鏡,手套與保暖衣");
if(season.value==="冬") notes.push("請攜帶個人盥洗用品,太陽眼鏡,厚外套,手套,保暖衣與保濕用品");
 if(type.value==="攝影") notes.push("請攜帶相機,鏡頭與備用電池");
 if(type.value==="怕冷") notes.push("建議準備暖暖包,在當地購買毛襪");
 if(food.value!=="不忌口") notes.push("飲食需求："+food.value);

 g.note=notes.join(" & ");
 save();
 render();

}
window.addEventListener("DOMContentLoaded", function(){
 show("login");
});

margin:0 auto 5px;> 燦爛陽光旅行</h3>

function shareTrip(){
 let g=groups[currentGroup];

 let data={
   name:currentUser,
   group:currentGroup,
   trip:g.trip,
   list:g.list,
   note:g.note
 };

 let encoded=btoa(unescape(encodeURIComponent(JSON.stringify(data))));
 let url=location.origin + location.pathname + "?data=" + encoded;

 navigator.clipboard.writeText(url);

 alert("🔗 專屬行程連結已複製，直接貼給客人即可！");
}

function loadShared(){
 let params=new URLSearchParams(window.location.search);
 let d=params.get("data");
 if(!d) return;

 let data=JSON.parse(decodeURIComponent(escape(atob(d))));

 currentUser=data.name;
 currentGroup=data.group;

 groups[currentGroup]={
   trip:data.trip,
   list:data.list,
   note:data.note
 };

 render();
 show("home");
}

window.addEventListener("DOMContentLoaded", function(){
 loadShared();
 show("login");
});
</script>
