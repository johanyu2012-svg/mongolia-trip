<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌞燦爛陽光旅行助手 Mongolia / Russia Ez Go🌞</title>

<style>
body{
 font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
 background: linear-gradient(135deg,#0B1E3B,#1f3c73);
 color:#fff;
 margin:0;
}

.header{
 padding:16px;
 text-align:center;
 background:rgba(0,0,0,0.3);
 backdrop-filter: blur(10px);
}

.section{
 max-width:480px;
 margin:auto;
 display:none;
 padding:10px;
}

.card{
 background:rgba(255,255,255,0.08);
 border-radius:12px;
 padding:10px;
 margin:10px;
}

.card h3{
 color:#FFD700;
 margin-bottom:5px;
}

button{
 background:linear-gradient(135deg,#FFD700,#FFA500);
 border:none;
 padding:10px;
 margin:5px;
 border-radius:8px;
 font-weight:bold;
}

input,select{
 width:80%;
 padding:8px;
 margin:5px;
 border-radius:8px;
 border:none;
}

.footer{
 font-size:12px;
 text-align:center;
 margin:10px;
 opacity:0.8;
}
</style>

<script>
let groups=JSON.parse(localStorage.getItem('groups')||'{}');
let users=JSON.parse(localStorage.getItem('users')||'[]');

if(!groups || Object.keys(groups).length===0){
 groups={
   "草原團":{
     list:["護照"],
     trip:["Day1 草原"],
     note:"注意事項"
   }
 };
 localStorage.setItem('groups',JSON.stringify(groups));
}

let currentGroup="",currentUser="";

function save(){
 localStorage.setItem('groups',JSON.stringify(groups));
 localStorage.setItem('users',JSON.stringify(users));
}

function show(id){
 document.querySelectorAll('.section').forEach(s=>s.style.display='none');
 document.getElementById(id).style.display='block';

 if(id==="login"){
   loadGroups();
   loadUsers();
 }
}

function loadGroups(){
 let sel=document.getElementById("group");
 sel.innerHTML='<option value="">選團</option>';
 Object.keys(groups).forEach(g=>{
   let opt=document.createElement("option");
   opt.value=g;
   opt.textContent=g;
   sel.appendChild(opt);
 });
}

function loadUsers(){
 let sel=document.getElementById("userHistory");
 sel.innerHTML='<option value="">歷史紀錄</option>';

 users.forEach(u=>{
   let opt=document.createElement("option");
   opt.value=u;
   opt.textContent=u;
   sel.appendChild(opt);
 });

 sel.onchange=function(){
   document.getElementById("nameInput").value=this.value;
 };
}

function login(){
 let name=document.getElementById("nameInput").value;
 let g=document.getElementById("group").value;

 if(!name||!g){alert("請填寫");return;}

 currentUser=name;
 currentGroup=g;

 if(!users.includes(name)) users.push(name);

 save();

 document.getElementById("userInfo").innerText="👤 "+name+"（"+g+"）";

 render();
 show("home");
}

function render(){
 let g=groups[currentGroup];
 if(!g) return;

 document.getElementById("trip").innerHTML=g.trip.join("<br>");
 document.getElementById("list").innerHTML=g.list.join("<br>");
 document.getElementById("note").innerText=g.note;
}

function generate(){
 let g=groups[currentGroup];

 let season=document.getElementById("season").value;
 let type=document.getElementById("type").value;
 let food=document.getElementById("food").value;

 let notes=[];

 if(season==="春") notes.push("保暖衣物");
 if(season==="夏") notes.push("防曬用品");
 if(season==="秋") notes.push("外套");
 if(season==="冬") notes.push("厚外套");

 if(type==="攝影") notes.push("相機設備");
 if(type==="怕冷") notes.push("暖暖包");

 if(food!=="不忌口") notes.push("飲食："+food);

 g.note=notes.join(" / ");
 save();
 render();
}

function exportPDF(){
 let g=groups[currentGroup];

 let html=`
 <div style="padding:20px">
 <h2>🌞燦爛陽光旅行</h2>
 <h3>${currentUser}（${currentGroup}）</h3>
 <hr>
 <h3>行程</h3>${g.trip.join("<br>")}
 <h3>清單</h3>${g.list.join("<br>")}
 <h3>注意事項</h3>${g.note}
 </div>
 `;

 let w=window.open("");
 w.document.write(html);
 w.print();
}

function shareTrip(){
 let g=groups[currentGroup];

 let data={
   name:currentUser,
   group:currentGroup,
   trip:g.trip,
   list:g.list,
   note:g.note
 };

 let encoded=btoa(encodeURIComponent(JSON.stringify(data)));

 let url="https://johanyu2012-svg.github.io/mongolia-trip/?d="+encoded;

 navigator.clipboard.writeText(url);

 alert("🔗 客人專屬行程已複製！");
}

function loadShared(){
 let params=new URLSearchParams(window.location.search);
 let d=params.get("d");
 if(!d) return;

 let data=JSON.parse(decodeURIComponent(atob(d)));

 currentUser=data.name;
 currentGroup=data.group;

 groups[currentGroup]=data;

 render();
 show("home");

 document.getElementById("adminBtn").style.display="none";
}

window.addEventListener("DOMContentLoaded", function(){
 loadShared();
 show("login");
});
</script>
</head>

<body>

<div class="header">
<img src="logo.png" style="width:60px;max-width:60px;">
<div>燦爛陽光旅行助手</div>
<div style="font-size:12px;">Mongolia / Russia Ez Go</div>
</div>

<div id="login" class="section" style="display:block;">
<input id="nameInput" placeholder="姓名"><br>
<select id="userHistory"></select><br>
<select id="group"></select><br>
<button onclick="login()">進入</button>
</div>

<div id="home" class="section">
<div id="userInfo"></div>

<div class="card"><h3>行程</h3><div id="trip"></div></div>
<div class="card"><h3>清單</h3><div id="list"></div></div>
<div class="card"><h3>注意事項</h3><div id="note"></div></div>

<div id="adminBtn">
<button onclick="show('gen')">生成器</button>
<button onclick="exportPDF()">PDF</button>
<button onclick="shareTrip()">分享</button>
<button onclick="show('login')">返回</button>
</div>
</div>

<div id="gen" class="section">
<select id="season"><option>春</option><option>夏</option><option>秋</option><option>冬</option></select>
<select id="type"><option>一般</option><option>攝影</option><option>怕冷</option></select>
<select id="food">
<option>不忌口</option>
<option>奶蛋素</option>
<option>全素</option>
<option>不吃牛</option>
<option>不吃羊</option>
</select>
<button onclick="generate()">生成</button>
<button onclick="show('home')">返回</button>
</div>

<div class="footer">
📞 WhatsApp: +976-95232642 ｜ mongoliaonline.net
</div>

</body>
</html>
